<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#FF6B5A" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.json" />
    <title>VOIS</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // In development: unregister any stale service workers to prevent cache issues
      // In production: register the service worker for offline support
      if ("serviceWorker" in navigator) {
        if (location.hostname === "localhost" || location.hostname === "127.0.0.1") {
          // Dev mode: unregister all service workers and clear caches
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            registrations.forEach(function(registration) {
              registration.unregister();
            });
          });
          if (window.caches) {
            caches.keys().then(function(names) {
              names.forEach(function(name) { caches.delete(name); });
            });
          }
        } else {
          navigator.serviceWorker.register("/sw.js").catch(() => {});
        }
      }
    </script>
  </body>
</html>
